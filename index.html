<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIVAC - Sistema de Gestión de Vacunas | DISA Apurímac II</title>
    <meta name="description" content="Sistema Integral de Gestión de Vacunas para la Dirección Regional de Salud Apurímac II" />
    <script>
      // No-flash: aplica el tema ANTES del primer paint para evitar FOUC.
      // Sincroniza con ThemeContext (clave localStorage 'sivac-theme').
      (function () {
        try {
          var pref = localStorage.getItem('sivac-theme') || 'system';
          var dark = pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
